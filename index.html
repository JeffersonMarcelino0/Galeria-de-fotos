<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='http://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel="stylesheet" >
     <link rel="shortcut icon" href="./img/icon.png" />
    <link rel="stylesheet" href="style.css">
    <title>Galeria do amor</title>
</head>

<body>

    <main class="container">
        <form id="loginForm">
            <h1>SEJA BEM VINDO(a)</h1>
            <h2>Faça seu login</h2>
            <div class="input-box">
                <input type="email" id="email" placeholder="E-mail" required>
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Senha" required>
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="relembrar-senha">
                <label>
                    <input type="checkbox">
                    lembrar senha
                </label>
                <a href="#">Esqueci a senha</a>
            </div>
            


            <button type="submit" class="login">Login </button>

            <div class="register-link">
                <p> Não tem uma conta?<a href="./registro.html"> registre-se</a></p>
            </div>

        </form>

    </main>

</body>

</html>
<script src="auth.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    const result = auth.login(email, password);
    
    if (result.success) {
        alert(result.message);
        // Redireciona para página principal
        window.location.href = 'telaHome.html'; // Crie esta página
    } else {
        alert(result.message);
    }
});

// Auto-login se "lembrar senha" estiver marcado (simplificado)
if (auth.isLoggedIn()) {
    window.location.href = 'telaHome.html';
}
</script>
